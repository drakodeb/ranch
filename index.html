<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estado Animales</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #FAFAF8;
    --card:     #ffffff;
    --text:     #1a1a1a;
    --muted:    #888;
    --faint:    #bbb;
    --hato-bg:  #EDF7F1; --hato-bd: #c3e8d0; --hato-val: #2E7D52;
    --neto-bg:  #EEF4FB; --neto-bd: #c3d9f2; --neto-val: #1E5FAA;
    --donut-bd: #ffffff;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg:       #191919;
      --card:     #191919;
      --text:     #efefef;
      --muted:    #888;
      --faint:    #555;
      --hato-bg:  #162a1e; --hato-bd: #274d35; --hato-val: #5ecf8a;
      --neto-bg:  #141e30; --neto-bd: #1e3a6a; --neto-val: #6aaff7;
      --donut-bd: #191919;
    }
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--card);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
  }

  /* ── Layout horizontal ── */
  .card {
    background: var(--card);
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 16px;
    width: 100%;
    max-width: 820px;
    overflow: visible;
    padding: 0;
  }

  /* Columna izquierda: solo el anillo */
  .col-chart {
    flex: 0 0 auto;
    width: 300px;
  }

  .chart-wrap {
    width: 100%;
  }

  .chart-wrap canvas { display: block; width: 100% !important; }

  /* Columna derecha: título, totales, leyenda */
  .col-info {
    flex: 1 1 auto;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.35rem;
    color: var(--text);
    margin-bottom: 2px;
  }

  .header p {
    font-size: 0.80rem;
    color: var(--muted);
    letter-spacing: 0.02em;
  }

  /* Totales */
  .totales {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .total-box { border-radius: 12px; padding: 12px 14px; text-align: center; }
  .total-box.hato { background: var(--hato-bg); border: 1.5px solid var(--hato-bd); }
  .total-box.neto { background: var(--neto-bg); border: 1.5px solid var(--neto-bd); }

  .total-box .valor {
    font-family: 'DM Serif Display', serif;
    font-size: 1.8rem;
    line-height: 1;
  }

  .total-box.hato .valor { color: var(--hato-val); }
  .total-box.neto .valor { color: var(--neto-val); }

  .total-box .etiqueta {
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-top: 4px;
  }

  .total-box .nota { font-size: 0.64rem; color: var(--faint); margin-top: 2px; }

  /* Leyenda */
  .legend { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 16px; }
  .legend-item { display: flex; align-items: center; gap: 7px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .legend-text { flex: 1; font-size: 0.76rem; color: var(--text); }
  .legend-count { font-size: 0.76rem; font-weight: 500; color: var(--text); }
  .legend-pct { font-size: 0.67rem; color: var(--muted); margin-left: 2px; }

  /* ── Móvil: vertical ── */
  @media (max-width: 560px) {
    .card {
      flex-direction: column;
      align-items: stretch;
      padding: 0;
      gap: 20px;
    }

    .col-chart {
      width: 100%;
      max-width: 280px;
      margin: 0 auto;
    }

    .legend { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="card">

  <!-- Columna izquierda: anillo -->
  <div class="col-chart">
    <div class="chart-wrap">
      <canvas id="donut"></canvas>
    </div>
  </div>

  <!-- Columna derecha: info -->
  <div class="col-info">

    <div class="header">
      <h1>Rancho Alto</h1>
      <p>Estado actual del inventario</p>
    </div>

    <div class="totales">
      <div class="total-box hato">
        <div class="valor" id="totalHato">0</div>
        <div class="etiqueta">Total Hato</div>
        <div class="nota">sin muerto ni vendido</div>
      </div>
      <div class="total-box neto">
        <div class="valor" id="totalNeto">0</div>
        <div class="etiqueta">Total Neto</div>
        <div class="nota">todos los estados</div>
      </div>
    </div>

    <div class="legend" id="legend"></div>

  </div>
</div>

<script>
// ════════════════════════════════════════════
//  EDITA AQUÍ TUS DATOS
// ════════════════════════════════════════════
let estadosData = {
  "Levante":            5,
  "Engorda":            3,
  "Traspaso":           3,
  "Vendido":            10,
  "Repr Activo": 17,
  "Muerto":              6
};

const excluirDeHato = ["Vendido", "Muerto"];

const colores = {
  "Levante":            "#F4A34D",
  "Engorda":            "#3B9EBF",
  "Traspaso":           "#9C7EEC",
  "Vendido":            "#FFD54F",
  "Repr Activo": "#4CAF7D",
  "Muerto":             "#E05C5C",
  _extra: ['#F06292','#78909C','#A5D6A7','#80DEEA']
};
// ════════════════════════════════════════════

let chart;

function isDark() {
  return window.matchMedia('(prefers-color-scheme: dark)').matches;
}

function getColor(name, idx) {
  return colores[name] || colores._extra[idx % colores._extra.length];
}

function calcTotales(data) {
  let hato = 0, neto = 0;
  Object.entries(data).forEach(([k, v]) => {
    neto += v;
    if (!excluirDeHato.includes(k)) hato += v;
  });
  return { hato, neto };
}

const outerLabelsPlugin = {
  id: 'outerLabels',
  afterDraw(chart) {
    const { ctx, data, chartArea } = chart;
    const meta  = chart.getDatasetMeta(0);
    const total = data.datasets[0].data.reduce((a, b) => a + b, 0);
    if (!total) return;

    const dark = isDark();
    const cx   = (chartArea.left + chartArea.right)  / 2;
    const cy   = (chartArea.top  + chartArea.bottom) / 2;

    ctx.save();

    meta.data.forEach((arc, i) => {
      const value = data.datasets[0].data[i];
      if (value / total < 0.04) return;

      const pct      = Math.round(value / total * 100);
      const label    = data.labels[i];
      const color    = data.datasets[0].backgroundColor[i];
      const midAngle = (arc.startAngle + arc.endAngle) / 2;
      const outerR   = arc.outerRadius;
      const isRight  = Math.cos(midAngle) >= 0;

      const x1 = cx + Math.cos(midAngle) * (outerR + 6);
      const y1 = cy + Math.sin(midAngle) * (outerR + 6);
      const x2 = cx + Math.cos(midAngle) * (outerR + 26);
      const y2 = cy + Math.sin(midAngle) * (outerR + 26);
      const x3 = x2 + (isRight ? 14 : -14);
      const y3 = y2;

      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.lineTo(x3, y3);
      ctx.strokeStyle = color;
      ctx.lineWidth   = 1.5;
      ctx.lineJoin    = 'round';
      ctx.stroke();

      const tx = isRight ? x3 + 5 : x3 - 5;
      const ty = y3;

      ctx.textAlign    = isRight ? 'left' : 'right';
      ctx.textBaseline = 'bottom';
      ctx.font         = '600 10px "DM Sans", sans-serif';
      ctx.fillStyle    = dark ? '#efefef' : '#1a1a1a';
      ctx.fillText(label, tx, ty);

      ctx.textBaseline = 'top';
      ctx.font         = '400 9.5px "DM Sans", sans-serif';
      ctx.fillStyle    = dark ? '#aaa' : '#666';
      ctx.fillText(`${value} · ${pct}%`, tx, ty + 2);
    });

    ctx.restore();
  }
};

function buildChart(data) {
  const labels   = Object.keys(data);
  const values   = Object.values(data);
  const bgColors = labels.map((l, i) => getColor(l, i));
  const { hato, neto } = calcTotales(data);
  const dark = isDark();

  document.getElementById('totalHato').textContent = hato;
  document.getElementById('totalNeto').textContent = neto;

  document.getElementById('legend').innerHTML = labels.map((l, i) => {
    const pct = neto ? Math.round(values[i] / neto * 100) : 0;
    return `<div class="legend-item">
      <div class="dot" style="background:${bgColors[i]}"></div>
      <span class="legend-text">${l}</span>
      <span class="legend-count">${values[i]}<span class="legend-pct"> ${pct}%</span></span>
    </div>`;
  }).join('');

  const ctx = document.getElementById('donut').getContext('2d');
  if (chart) chart.destroy();

  chart = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels,
      datasets: [{
        data: values,
        backgroundColor: bgColors,
        borderWidth: 3,
        borderColor: dark ? '#191919' : '#ffffff',
        hoverOffset: 6
      }]
    },
    options: {
      cutout: '55%',
      layout: {
        padding: { top: 48, bottom: 48, left: 72, right: 72 }
      },
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: c => {
              const v   = c.parsed;
              const pct = neto ? Math.round(v / neto * 100) : 0;
              return ` ${v} anim · ${pct}%`;
            }
          }
        }
      },
      animation: { animateRotate: true, duration: 700 }
    },
    plugins: [outerLabelsPlugin]
  });
}

window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
  buildChart(estadosData);
});

buildChart(estadosData);
</script>
</body>
</html>

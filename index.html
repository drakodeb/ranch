<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estado Animales</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:   #FAFAF8;
    --card: #FFFFFF;
    --text: #1a1a1a;
    --muted:#888;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
  }

  .card {
    background: var(--card);
    border-radius: 20px;
    box-shadow: 0 4px 32px rgba(0,0,0,0.07);
    padding: 32px 36px 28px;
    max-width: 500px;
    width: 100%;
  }

  h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.45rem;
    color: var(--text);
    margin-bottom: 4px;
  }

  .subtitle {
    font-size: 0.82rem;
    color: var(--muted);
    margin-bottom: 24px;
    letter-spacing: 0.02em;
  }

  /* ── Totales ── */
  .totales {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 28px;
  }

  .total-box {
    border-radius: 14px;
    padding: 14px 16px;
    text-align: center;
  }

  .total-box.hato {
    background: #EDF7F1;
    border: 1.5px solid #c3e8d0;
  }

  .total-box.neto {
    background: #EEF4FB;
    border: 1.5px solid #c3d9f2;
  }

  .total-box .valor {
    font-family: 'DM Serif Display', serif;
    font-size: 2rem;
    line-height: 1;
  }

  .total-box.hato .valor { color: #2E7D52; }
  .total-box.neto .valor { color: #1E5FAA; }

  .total-box .etiqueta {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-top: 4px;
  }

  .total-box .nota {
    font-size: 0.67rem;
    color: #bbb;
    margin-top: 3px;
  }

  /* ── Gráfico ── */
  .chart-wrap {
    position: relative;
    width: 210px;
    margin: 0 auto 28px;
  }

  /* ── Leyenda ── */
  .legend {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px 20px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .dot {
    width: 11px; height: 11px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .legend-text {
    flex: 1;
    font-size: 0.79rem;
    color: var(--text);
  }

  .legend-count {
    font-size: 0.79rem;
    font-weight: 500;
    color: var(--text);
  }

  .legend-pct {
    font-size: 0.69rem;
    color: var(--muted);
    margin-left: 2px;
  }

  /* ── Panel edición ── */
  details {
    margin-top: 24px;
    border-top: 1px solid #eee;
    padding-top: 16px;
  }

  summary {
    font-size: 0.78rem;
    color: var(--muted);
    cursor: pointer;
    user-select: none;
    letter-spacing: 0.04em;
  }

  .inputs {
    margin-top: 14px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px 16px;
  }

  .input-group label {
    display: block;
    font-size: 0.72rem;
    color: var(--muted);
    margin-bottom: 3px;
  }

  .input-group input {
    width: 100%;
    border: 1px solid #e0e0e0;
    border-radius: 7px;
    padding: 5px 8px;
    font-size: 0.85rem;
    font-family: inherit;
    outline: none;
    transition: border-color .2s;
  }

  .input-group input:focus { border-color: #aaa; }

  button.apply {
    margin-top: 12px;
    width: 100%;
    padding: 8px;
    border: none;
    border-radius: 9px;
    background: var(--text);
    color: #fff;
    font-family: inherit;
    font-size: 0.82rem;
    cursor: pointer;
    transition: opacity .2s;
  }

  button.apply:hover { opacity: 0.82; }
</style>
</head>
<body>
<div class="card">
  <h1>Hato de Animales</h1>
  <p class="subtitle">Estado actual del inventario</p>

  <!-- Totales -->
  <div class="totales">
    <div class="total-box hato">
      <div class="valor" id="totalHato">0</div>
      <div class="etiqueta">Total Hato</div>
      <div class="nota">sin muerto ni vendido</div>
    </div>
    <div class="total-box neto">
      <div class="valor" id="totalNeto">0</div>
      <div class="etiqueta">Total Neto</div>
      <div class="nota">todos los estados</div>
    </div>
  </div>

  <!-- Gráfico -->
  <div class="chart-wrap">
    <canvas id="donut" width="210" height="210"></canvas>
  </div>

  <!-- Leyenda -->
  <div class="legend" id="legend"></div>

  <!-- Panel edición manual -->
  <details>
    <summary>✏️ Actualizar datos manualmente</summary>
    <div class="inputs" id="inputs"></div>
    <button class="apply" onclick="applyInputs()">Actualizar gráfico</button>
  </details>
</div>

<script>
// ════════════════════════════════════════════
//  EDITA AQUÍ TUS DATOS
// ════════════════════════════════════════════
let estadosData = {
  "Reproductor Activo": 18,
  "Reemplazo":          12,
  "Engorda":            15,
  "Vendido":            25,
  "Muerto":              7
};

// Estos estados NO cuentan para el Total Hato
const excluirDeHato = ["Muerto", "Vendido"];

const colores = {
  "Reproductor Activo": "#4CAF7D",
  "Reemplazo":          "#3B9EBF",
  "Engorda":            "#F4A34D",
  "Vendido":            "#9C7EEC",
  "Muerto":             "#E05C5C",
  _extra: ['#F06292','#78909C','#FFD54F','#A5D6A7','#80DEEA']
};
// ════════════════════════════════════════════

let chart;

function getColor(name, idx) {
  return colores[name] || colores._extra[idx % colores._extra.length];
}

function calcTotales(data) {
  let hato = 0, neto = 0;
  Object.entries(data).forEach(([k, v]) => {
    neto += v;
    if (!excluirDeHato.includes(k)) hato += v;
  });
  return { hato, neto };
}

function buildChart(data) {
  const labels   = Object.keys(data);
  const values   = Object.values(data);
  const bgColors = labels.map((l, i) => getColor(l, i));
  const { hato, neto } = calcTotales(data);

  document.getElementById('totalHato').textContent = hato;
  document.getElementById('totalNeto').textContent = neto;

  // Leyenda
  const legendEl = document.getElementById('legend');
  legendEl.innerHTML = labels.map((l, i) => {
    const pct = neto ? Math.round(values[i] / neto * 100) : 0;
    return `<div class="legend-item">
      <div class="dot" style="background:${bgColors[i]}"></div>
      <span class="legend-text">${l}</span>
      <span class="legend-count">${values[i]}<span class="legend-pct"> ${pct}%</span></span>
    </div>`;
  }).join('');

  // Inputs
  const inputsEl = document.getElementById('inputs');
  inputsEl.innerHTML = labels.map(l => `
    <div class="input-group">
      <label>${l}</label>
      <input type="number" id="inp_${l.replace(/\s+/g,'_')}" value="${data[l]}" min="0">
    </div>`).join('');

  // Chart
  const ctx = document.getElementById('donut').getContext('2d');
  if (chart) chart.destroy();
  chart = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels,
      datasets: [{
        data: values,
        backgroundColor: bgColors,
        borderWidth: 3,
        borderColor: '#ffffff',
        hoverOffset: 8
      }]
    },
    options: {
      cutout: '65%',
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => {
              const v = ctx.parsed;
              const pct = neto ? Math.round(v / neto * 100) : 0;
              return ` ${v} animales (${pct}% del neto)`;
            }
          }
        }
      },
      animation: { animateRotate: true, duration: 700 }
    }
  });
}

function applyInputs() {
  const newData = {};
  Object.keys(estadosData).forEach(k => {
    const id = 'inp_' + k.replace(/\s+/g,'_');
    const el = document.getElementById(id);
    if (el) newData[k] = parseInt(el.value) || 0;
  });
  estadosData = newData;
  buildChart(estadosData);
}

buildChart(estadosData);
</script>
</body>
</html>

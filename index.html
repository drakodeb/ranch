<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estado Animales</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  /* ── Tema claro ── */
  :root {
    --bg:          #FAFAF8;
    --card:        #ffffff;
    --shadow:      rgba(0,0,0,0.07);
    --text:        #1a1a1a;
    --muted:       #888;
    --faint:       #bbb;
    --border:      #eee;
    --input-bd:    #e0e0e0;
    --input-focus: #aaa;
    --btn:         #1a1a1a;
    --btn-text:    #ffffff;
    --hato-bg:     #EDF7F1;
    --hato-bd:     #c3e8d0;
    --hato-val:    #2E7D52;
    --neto-bg:     #EEF4FB;
    --neto-bd:     #c3d9f2;
    --neto-val:    #1E5FAA;
    --donut-bd:    #ffffff;
  }

  /* ── Tema oscuro automático ── */
  @media (prefers-color-scheme: dark) {
    :root {
      --bg:          #111113;
      --card:        #1c1c1e;
      --shadow:      rgba(0,0,0,0.5);
      --text:        #efefef;
      --muted:       #888;
      --faint:       #555;
      --border:      #2a2a2a;
      --input-bd:    #333;
      --input-focus: #666;
      --btn:         #efefef;
      --btn-text:    #1a1a1a;
      --hato-bg:     #162a1e;
      --hato-bd:     #274d35;
      --hato-val:    #5ecf8a;
      --neto-bg:     #141e30;
      --neto-bd:     #1e3a6a;
      --neto-val:    #6aaff7;
      --donut-bd:    #1c1c1e;
    }
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
    transition: background .3s;
  }

  .card {
    background: var(--card);
    border-radius: 20px;
    box-shadow: 0 4px 32px var(--shadow);
    padding: 32px 36px 28px;
    max-width: 720px;
    width: 100%;
    overflow: visible;
  }

  h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.45rem;
    color: var(--text);
    margin-bottom: 4px;
  }

  .subtitle {
    font-size: 0.82rem;
    color: var(--muted);
    margin-bottom: 24px;
    letter-spacing: 0.02em;
  }

  .totales {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 28px;
  }

  .total-box { border-radius: 14px; padding: 14px 16px; text-align: center; }
  .total-box.hato { background: var(--hato-bg); border: 1.5px solid var(--hato-bd); }
  .total-box.neto { background: var(--neto-bg); border: 1.5px solid var(--neto-bd); }

  .total-box .valor {
    font-family: 'DM Serif Display', serif;
    font-size: 2rem;
    line-height: 1;
  }

  .total-box.hato .valor { color: var(--hato-val); }
  .total-box.neto .valor { color: var(--neto-val); }

  .total-box .etiqueta {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-top: 4px;
  }

  .total-box .nota { font-size: 0.67rem; color: var(--faint); margin-top: 3px; }

  .chart-wrap {
    width: 100%;
    max-width: 380px;
    margin: 0 auto 24px;
  }

  .chart-wrap canvas { display: block; width: 100% !important; }

  @media (max-width: 480px) {
    .chart-wrap { max-width: 290px; }
    .card { padding: 20px 16px 20px; }
    .legend { grid-template-columns: 1fr; }
  }

  .legend { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 20px; }
  .legend-item { display: flex; align-items: center; gap: 8px; }
  .dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }
  .legend-text { flex: 1; font-size: 0.79rem; color: var(--text); }
  .legend-count { font-size: 0.79rem; font-weight: 500; color: var(--text); }
  .legend-pct { font-size: 0.69rem; color: var(--muted); margin-left: 2px; }

  details { margin-top: 24px; border-top: 1px solid var(--border); padding-top: 16px; }

  summary {
    font-size: 0.78rem;
    color: var(--muted);
    cursor: pointer;
    user-select: none;
    letter-spacing: 0.04em;
  }

  .inputs { margin-top: 14px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px 16px; }

  .input-group label { display: block; font-size: 0.72rem; color: var(--muted); margin-bottom: 3px; }

  .input-group input {
    width: 100%;
    border: 1px solid var(--input-bd);
    border-radius: 7px;
    padding: 5px 8px;
    font-size: 0.85rem;
    font-family: inherit;
    outline: none;
    background: var(--card);
    color: var(--text);
    transition: border-color .2s;
  }

  .input-group input:focus { border-color: var(--input-focus); }

  button.apply {
    margin-top: 12px;
    width: 100%;
    padding: 8px;
    border: none;
    border-radius: 9px;
    background: var(--btn);
    color: var(--btn-text);
    font-family: inherit;
    font-size: 0.82rem;
    cursor: pointer;
    transition: opacity .2s;
  }

  button.apply:hover { opacity: 0.78; }
</style>
</head>
<body>
<div class="card">
  <h1>Hato de Animales</h1>
  <p class="subtitle">Estado actual del inventario</p>

  <div class="totales">
    <div class="total-box hato">
      <div class="valor" id="totalHato">0</div>
      <div class="etiqueta">Total Hato</div>
      <div class="nota">sin muerto ni vendido</div>
    </div>
    <div class="total-box neto">
      <div class="valor" id="totalNeto">0</div>
      <div class="etiqueta">Total Neto</div>
      <div class="nota">todos los estados</div>
    </div>
  </div>

  <div class="chart-wrap">
    <canvas id="donut"></canvas>
  </div>

  <div class="legend" id="legend"></div>

  <details>
    <summary>✏️ Actualizar datos manualmente</summary>
    <div class="inputs" id="inputs"></div>
    <!-- <button class="apply" onclick="applyInputs()">Actualizar gráfico</button> -->
  </details>
</div>

<script>
// ════════════════════════════════════════════
//  EDITA AQUÍ TUS DATOS
// ════════════════════════════════════════════
let estadosData = {
  "Reproductor Activo": 17,
  "Reemplazo":          0,
  "Engorda":            4,
  "Vendido":            10,
  "Muerto":              6
};

const excluirDeHato = ["Muerto", "Vendido"];

const colores = {
  "Reproductor Activo": "#4CAF7D",
  "Reemplazo":          "#3B9EBF",
  "Engorda":            "#F4A34D",
  "Vendido":            "#9C7EEC",
  "Muerto":             "#E05C5C",
  _extra: ['#F06292','#78909C','#FFD54F','#A5D6A7','#80DEEA']
};
// ════════════════════════════════════════════

let chart;

// Detecta si el dispositivo está en modo oscuro
function isDark() {
  return window.matchMedia('(prefers-color-scheme: dark)').matches;
}

function getColor(name, idx) {
  return colores[name] || colores._extra[idx % colores._extra.length];
}

function calcTotales(data) {
  let hato = 0, neto = 0;
  Object.entries(data).forEach(([k, v]) => {
    neto += v;
    if (!excluirDeHato.includes(k)) hato += v;
  });
  return { hato, neto };
}

// Plugin: dibuja etiquetas externas con línea → codo → texto
const outerLabelsPlugin = {
  id: 'outerLabels',
  afterDraw(chart) {
    const { ctx, data, chartArea } = chart;
    const meta  = chart.getDatasetMeta(0);
    const total = data.datasets[0].data.reduce((a, b) => a + b, 0);
    if (!total) return;

    const dark = isDark();
    const cx   = (chartArea.left + chartArea.right)  / 2;
    const cy   = (chartArea.top  + chartArea.bottom) / 2;

    ctx.save();

    meta.data.forEach((arc, i) => {
      const value = data.datasets[0].data[i];
      if (value / total < 0.04) return;

      const pct      = Math.round(value / total * 100);
      const label    = data.labels[i];
      const color    = data.datasets[0].backgroundColor[i];
      const midAngle = (arc.startAngle + arc.endAngle) / 2;
      const outerR   = arc.outerRadius;
      const isRight  = Math.cos(midAngle) >= 0;

      const x1 = cx + Math.cos(midAngle) * (outerR + 6);
      const y1 = cy + Math.sin(midAngle) * (outerR + 6);
      const x2 = cx + Math.cos(midAngle) * (outerR + 30);
      const y2 = cy + Math.sin(midAngle) * (outerR + 30);
      const x3 = x2 + (isRight ? 16 : -16);
      const y3 = y2;

      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.lineTo(x3, y3);
      ctx.strokeStyle = color;
      ctx.lineWidth   = 1.5;
      ctx.lineJoin    = 'round';
      ctx.stroke();

      const tx = isRight ? x3 + 5 : x3 - 5;
      const ty = y3;

      ctx.textAlign = isRight ? 'left' : 'right';

      // Nombre del estado
      ctx.textBaseline = 'bottom';
      ctx.font         = '600 11px "DM Sans", sans-serif';
      ctx.fillStyle    = dark ? '#efefef' : '#1a1a1a';
      ctx.fillText(label, tx, ty);

      // Cantidad y porcentaje
      ctx.textBaseline = 'top';
      ctx.font         = '400 10.5px "DM Sans", sans-serif';
      ctx.fillStyle    = dark ? '#aaa' : '#666';
      ctx.fillText(`${value} animales · ${pct}%`, tx, ty + 2);
    });

    ctx.restore();
  }
};

function buildChart(data) {
  const labels   = Object.keys(data);
  const values   = Object.values(data);
  const bgColors = labels.map((l, i) => getColor(l, i));
  const { hato, neto } = calcTotales(data);
  const dark = isDark();

  document.getElementById('totalHato').textContent = hato;
  document.getElementById('totalNeto').textContent = neto;

  document.getElementById('legend').innerHTML = labels.map((l, i) => {
    const pct = neto ? Math.round(values[i] / neto * 100) : 0;
    return `<div class="legend-item">
      <div class="dot" style="background:${bgColors[i]}"></div>
      <span class="legend-text">${l}</span>
      <span class="legend-count">${values[i]}<span class="legend-pct"> ${pct}%</span></span>
    </div>`;
  }).join('');

  document.getElementById('inputs').innerHTML = labels.map(l => `
    <div class="input-group">
      <label>${l}</label>
      <input type="number" id="inp_${l.replace(/\s+/g,'_')}" value="${data[l]}" min="0">
    </div>`).join('');

  const ctx = document.getElementById('donut').getContext('2d');
  if (chart) chart.destroy();

  chart = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels,
      datasets: [{
        data: values,
        backgroundColor: bgColors,
        borderWidth: 3,
        borderColor: dark ? '#1c1c1e' : '#ffffff',
        hoverOffset: 6
      }]
    },
    options: {
      cutout: '55%',
      layout: {
        padding: { top: 55, bottom: 55, left: 90, right: 90 }
      },
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: c => {
              const v   = c.parsed;
              const pct = neto ? Math.round(v / neto * 100) : 0;
              return ` ${v} animales · ${pct}%`;
            }
          }
        }
      },
      animation: { animateRotate: true, duration: 700 }
    },
    plugins: [outerLabelsPlugin]
  });
}

function applyInputs() {
  const newData = {};
  Object.keys(estadosData).forEach(k => {
    const el = document.getElementById('inp_' + k.replace(/\s+/g,'_'));
    if (el) newData[k] = parseInt(el.value) || 0;
  });
  estadosData = newData;
  buildChart(estadosData);
}

// Reconstruir el gráfico si el usuario cambia el tema del sistema
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
  buildChart(estadosData);
});

buildChart(estadosData);
</script>
</body>
</html>
